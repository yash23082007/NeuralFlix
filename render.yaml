services:
  - type: web
    name: movie-recs-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: movie-recs-db
          property: connectionString
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: WATCHMODE_API_KEY
        sync: false
      - key: TRAKT_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: movie-recs-db
    databaseName: movie_recs
    user: movie_user
